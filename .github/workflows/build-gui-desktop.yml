name: Build GUI Desktop Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    defaults:
      run:
        working-directory: diffrenciation/power rule menthod/GUI OF POWER RULE MENTHOD/differentiation-gui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install desktop build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 sympy pyinstaller

      - name: Build desktop package
        run: python build_release.py

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-desktop-build
          path: diffrenciation/power rule menthod/GUI OF POWER RULE MENTHOD/differentiation-gui/build_artifacts/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.*
